      <rect x="168" y="318" width="22" height="22"/>
      <rect x="84" y="174" width="14" height="22"/>
      <rect x="84" y="292" width="14" height="22"/>
      <rect x="412" y="146" width="16" height="16"/>
      <rect x="411" y="302" width="17" height="17"/>
    </g>
