<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Módulos Prefabricados San José">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="78%">
      <stop offset="0" stop-color="#08224a"/>
      <stop offset="1" stop-color="#020617"/>
    </radialGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000814" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="42" fill="url(#bg)"/>

  <g fill="none" stroke-linecap="butt">
    <path d="M58 247A198 198 0 0 1 454 247" stroke="#ff7a00" stroke-width="17"/>
    <path d="M58 265A198 198 0 0 0 454 265" stroke="#ffffff" stroke-width="17"/>
  </g>

  <g filter="url(#soft)" stroke-linejoin="round" stroke-linecap="square">
    <!-- Módulo prefabricado -->
    <path d="M91 177 L178 112 L421 149 L421 312 L178 334 L91 304 Z" fill="#ffffff" stroke="#ffffff" stroke-width="8"/>
    <path d="M91 177 L178 112 L178 334 L91 304 Z" fill="#f8fafc" stroke="#ffffff" stroke-width="8"/>
    <path d="M178 112 L421 149 L421 312 L178 334 Z" fill="#ffffff" stroke="#ffffff" stroke-width="8"/>

    <!-- Estructura azul -->
    <path d="M178 112 L178 334" stroke="#031b3d" stroke-width="10"/>
    <path d="M91 177 L178 112 L421 149" stroke="#031b3d" stroke-width="8"/>
    <path d="M91 304 L178 334 L421 312" stroke="#031b3d" stroke-width="8"/>
    <path d="M421 149 L421 312" stroke="#031b3d" stroke-width="8"/>

    <!-- Paneles laterales -->
    <g stroke="#cbd5e1" stroke-width="2">
      <path d="M112 181 L112 307"/>
      <path d="M132 166 L132 313"/>
      <path d="M152 151 L152 319"/>
      <path d="M214 124 L214 331"/>
      <path d="M251 130 L251 327"/>
      <path d="M288 136 L288 324"/>
      <path d="M325 141 L325 321"/>
      <path d="M362 146 L362 318"/>
