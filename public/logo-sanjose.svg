    <!-- Puerta -->
    <rect x="232" y="173" width="52" height="136" fill="#031b3d" stroke="#ffffff" stroke-width="6"/>
    <rect x="240" y="181" width="36" height="120" fill="#031b3d" stroke="#ffffff" stroke-width="3"/>
    <circle cx="268" cy="246" r="4" fill="#ffffff"/>
    <path d="M255 246 L266 246" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>

    <!-- Ventana -->
    <rect x="313" y="190" width="82" height="71" fill="#031b3d" stroke="#031b3d" stroke-width="5"/>
    <rect x="324" y="201" width="27" height="49" fill="#ffffff"/>
    <rect x="357" y="201" width="27" height="49" fill="#ffffff"/>

    <!-- Esquinas tipo contenedor -->
    <g fill="#031b3d" stroke="#ffffff" stroke-width="4">
