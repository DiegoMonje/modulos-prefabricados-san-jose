  <!-- Monograma SJ -->
  <g transform="translate(199 357)">
    <path d="M77 0 H28 C12 0 1 10 1 24 C1 38 12 47 27 47 H55 C63 47 67 50 67 56 C67 62 63 65 55 65 H2 V86 H61 C78 86 91 75 91 57 C91 41 80 31 61 31 H33 C25 31 21 28 21 23 C21 17 25 15 32 15 H77 Z" fill="#ffffff"/>
    <path d="M93 0 H122 V58 C122 77 109 88 91 88 H76 V66 H88 C92 66 93 64 93 59 Z" fill="#ff7a00"/>
